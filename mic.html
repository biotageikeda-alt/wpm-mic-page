<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gemini Mic Recorder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:sans-serif;padding:20px;background:#1e293b;color:#fff;">

  <p style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Target sentence:</p>
  <p id="sentence" style="font-size:14px;color:#e2e8f0;background:#334155;
     padding:10px;border-radius:6px;margin-bottom:16px;"></p>

  <p style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Gemini grade:</p>
  <p id="grade" style="font-size:13px;color:#bbf7d0;background:#14532d;
     display:inline-block;padding:6px 10px;border-radius:999px;margin-top:0;margin-bottom:16px;">
    economy
  </p>

  <p id="status" style="color:#94a3b8;">🎙 Startを押して録音してください</p>

  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button id="btnStart" onclick="startRec()"
      style="padding:12px 24px;font-size:16px;border-radius:8px;
             background:#3b82f6;color:#fff;border:none;cursor:pointer;">
      🎙 Start
    </button>

    <button id="btnStop" onclick="stopRec()" disabled
      style="padding:12px 24px;font-size:16px;border-radius:8px;
             background:#64748b;color:#fff;border:none;cursor:pointer;opacity:.65;">
      ■ Stop
    </button>
  </div>

  <p id="result" style="margin-top:12px;font-size:13px;color:#7dd3fc;"></p>
  <p id="debug" style="margin-top:12px;font-size:12px;color:#94a3b8;"></p>

  <script>
    var params = new URLSearchParams(window.location.search);
    var sentence = params.get('sentence') || '';
    var parentOrigin = params.get('origin') || '*';
    var geminiGrade = params.get('grade') || 'economy';

    var mediaRecorder = null;
    var audioChunks = [];
    var audioStream = null;
    var timer = null;
    var isRecording = false;
    var startedAt = 0;

    function setStatus(text, color){
      var el = document.getElementById('status');
      el.textContent = text;
      el.style.color = color || '#94a3b8';
    }

    function setDebug(text){
      document.getElementById('debug').textContent = text || '';
    }

    function setResult(text){
      document.getElementById('result').textContent = text || '';
    }

    function render(){
      document.getElementById('sentence').textContent = sentence || '(no sentence)';
      document.getElementById('grade').textContent = geminiGrade || 'economy';
    }

    function setButtons(recording){
      isRecording = recording;
      var start = document.getElementById('btnStart');
      var stop = document.getElementById('btnStop');
      start.disabled = recording;
      stop.disabled = !recording;
      start.style.opacity = recording ? '.55' : '1';
      stop.style.opacity = recording ? '1' : '.65';
    }

    function sendReady(){
      if(window.opener){
        window.opener.postMessage(
          { type: 'MIC_READY', target: sentence, grade: geminiGrade },
          parentOrigin
        );
      }
    }

    function sendError(msg){
      if(window.opener){
        window.opener.postMessage(
          { type: 'MIC_ERROR', error: msg || 'unknown', target: sentence, grade: geminiGrade },
          parentOrigin
        );
      }
    }

    function sendAudio(base64, mimeType, durationMs){
      if(window.opener){
        window.opener.postMessage(
          {
            type: 'MIC_AUDIO_RESULT',
            target: sentence,
            grade: geminiGrade,
            mimeType: mimeType || 'audio/webm',
            audioBase64: base64 || '',
            durationMs: durationMs || 0
          },
          parentOrigin
        );
      }
    }

    function cleanup(){
      if(timer){
        clearTimeout(timer);
        timer = null;
      }
      if(audioStream){
        try {
          audioStream.getTracks().forEach(function(t){ t.stop(); });
        } catch(e){}
        audioStream = null;
      }
      setButtons(false);
    }

    function blobToBase64(blob, callback){
      var reader = new FileReader();
      reader.onloadend = function(){
        var dataUrl = reader.result || '';
        var base64 = String(dataUrl).split(',')[1] || '';
        callback(base64);
      };
      reader.onerror = function(){
        sendError('FileReader failed');
      };
      reader.readAsDataURL(blob);
    }

    function getSupportedMimeType(){
      var candidates = [
        'audio/webm;codecs=opus',
        'audio/webm',
        'audio/mp4',
        'audio/ogg;codecs=opus'
      ];

      if(!window.MediaRecorder){
        return '';
      }

      for(var i = 0; i < candidates.length; i++){
        try {
          if(MediaRecorder.isTypeSupported(candidates[i])){
            return candidates[i];
          }
        } catch(e){}
      }
      return '';
    }

    function resetForNewSentence(newSentence, newGrade){
      sentence = newSentence || '';
      geminiGrade = newGrade || 'economy';
      setResult('');
      setStatus('🎙 Startを押して録音してください', '#94a3b8');
      setDebug('event: target updated');
      try {
        if(mediaRecorder && isRecording){
          mediaRecorder.stop();
        }
      } catch(e){}
      cleanup();
      render();
      window.focus();
      sendReady();
    }

    function startRec(){
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        setStatus('このブラウザではマイクAPIが使えません', '#fca5a5');
        sendError('getUserMedia not supported');
        return;
      }

      if(!window.MediaRecorder){
        setStatus('このブラウザでは録音APIが使えません', '#fca5a5');
        sendError('MediaRecorder not supported');
        return;
      }

      audioChunks = [];
      setResult('');
      setDebug('Preparing microphone...');

      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
        audioStream = stream;
        var mimeType = getSupportedMimeType();
        var options = mimeType ? { mimeType: mimeType } : {};

        try {
          mediaRecorder = new MediaRecorder(stream, options);
        } catch(e){
          cleanup();
          setStatus('録音を開始できません: ' + (e.message || e), '#fca5a5');
          sendError(e.message || String(e));
          return;
        }

        mediaRecorder.onstart = function(){
          startedAt = Date.now();
          setButtons(true);
          setStatus('🔴 Recording... Speak now.', '#bfdbfe');
          setDebug('event: recording started / Gemini mode');

          // 節約のため最大8秒で自動停止
          timer = setTimeout(function(){
            setDebug('event: timeout auto-stop');
            stopRec();
          }, 8000);
        };

        mediaRecorder.ondataavailable = function(e){
          if(e.data && e.data.size > 0){
            audioChunks.push(e.data);
          }
        };

        mediaRecorder.onerror = function(e){
          cleanup();
          var msg = e && e.error ? e.error.message || e.error.name : 'recording error';
          setStatus('録音エラー: ' + msg, '#fca5a5');
          setDebug('event: recorder error');
          sendError(msg);
        };

        mediaRecorder.onstop = function(){
          var durationMs = Date.now() - startedAt;
          var finalMime = mediaRecorder.mimeType || mimeType || 'audio/webm';
          cleanup();

          if(!audioChunks.length){
            setStatus('録音データがありません。もう一度Startを押してください。', '#fbbf24');
            setDebug('event: no audio chunks');
            sendError('No audio data');
            return;
          }

          var blob = new Blob(audioChunks, { type: finalMime });
          setStatus('Uploading audio to GAS / Gemini...', '#fbbf24');
          setDebug('event: audio blob ready / size: ' + blob.size + ' bytes');

          blobToBase64(blob, function(base64){
            setResult('録音完了。Gemini評価中...');
            sendAudio(base64, finalMime, durationMs);
          });
        };

        mediaRecorder.start();
      }).catch(function(err){
        cleanup();
        setStatus('マイク権限エラー: ' + (err.message || err.name || err), '#fca5a5');
        setDebug('event: getUserMedia error');
        sendError(err.message || err.name || String(err));
      });
    }

    function stopRec(){
      try {
        if(mediaRecorder && isRecording && mediaRecorder.state !== 'inactive'){
          setStatus('Stopping...', '#fbbf24');
          mediaRecorder.stop();
        }
      } catch(e){
        cleanup();
        setStatus('停止エラー: ' + (e.message || e), '#fca5a5');
        sendError(e.message || String(e));
      }
    }

    window.addEventListener('message', function(e){
      if(e.data && e.data.type === 'SET_TARGET'){
        if(e.origin){
          parentOrigin = e.origin;
        }
        resetForNewSentence(e.data.sentence || '', e.data.grade || 'economy');
      }

      if(e.data && e.data.type === 'START_MIC'){
        startRec();
      }
    });

    render();
    sendReady();
  </script>
</body>
</html>
