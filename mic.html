<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mic Recognition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:sans-serif;padding:20px;background:#1e293b;color:#fff;">

  <p style="font-size:12px;color:#94a3b8;margin-bottom:4px;">Target sentence:</p>
  <p id="sentence" style="font-size:14px;color:#e2e8f0;background:#334155;
     padding:10px;border-radius:6px;margin-bottom:16px;"></p>

  <p id="status" style="color:#94a3b8;">🎙 Startを押して話してください</p>

  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button id="btnStart" onclick="startRec()"
      style="padding:12px 24px;font-size:16px;border-radius:8px;
             background:#3b82f6;color:#fff;border:none;cursor:pointer;">
      🎙 Start
    </button>

    <button id="btnStop" onclick="stopRec()" disabled
      style="padding:12px 24px;font-size:16px;border-radius:8px;
             background:#64748b;color:#fff;border:none;cursor:pointer;opacity:.65;">
      ■ Stop
    </button>
  </div>

  <p id="result" style="margin-top:12px;font-size:13px;color:#7dd3fc;"></p>
  <p id="debug" style="margin-top:12px;font-size:12px;color:#94a3b8;"></p>

  <script>
    var params = new URLSearchParams(window.location.search);
    var sentence = params.get('sentence') || '';
    var parentOrigin = params.get('origin') || '*';

    var recognition = null;
    var heardFinal = '';
    var heardInterim = '';
    var timer = null;
    var isListening = false;

    function setStatus(text, color){
      var el = document.getElementById('status');
      el.textContent = text;
      el.style.color = color || '#94a3b8';
    }

    function setDebug(text){
      document.getElementById('debug').textContent = text || '';
    }

    function setResult(text){
      document.getElementById('result').textContent = text || '';
    }

    function renderSentence(){
      document.getElementById('sentence').textContent = sentence || '(no sentence)';
    }

    function setButtons(listening){
      isListening = listening;
      var start = document.getElementById('btnStart');
      var stop = document.getElementById('btnStop');
      start.disabled = listening;
      stop.disabled = !listening;
      start.style.opacity = listening ? '.55' : '1';
      stop.style.opacity = listening ? '1' : '.65';
    }

    function sendResult(text){
      if(window.opener){
        window.opener.postMessage(
          {
            type: 'MIC_RESULT',
            text: text || '',
            target: sentence
          },
          parentOrigin
        );
      }
    }

    function sendReady(){
      if(window.opener){
        window.opener.postMessage(
          {
            type: 'MIC_READY',
            target: sentence
          },
          parentOrigin
        );
      }
    }

    function sendError(msg){
      if(window.opener){
        window.opener.postMessage(
          {
            type: 'MIC_ERROR',
            error: msg || 'unknown',
            target: sentence
          },
          parentOrigin
        );
      }
    }

    function cleanup(){
      if(timer){
        clearTimeout(timer);
        timer = null;
      }
      setButtons(false);
    }

    function resetForNewSentence(newSentence){
      sentence = newSentence || '';
      renderSentence();
      heardFinal = '';
      heardInterim = '';
      setResult('');
      setStatus('🎙 Startを押して話してください', '#94a3b8');
      setDebug('event: target updated');
      try {
        if(recognition && isListening){
          recognition.stop();
        }
      } catch(e){}
      cleanup();
      window.focus();
      sendReady();
    }

    function finishWithText(text, autoClose){
      cleanup();
      var finalText = text || heardFinal || heardInterim || '';
      setResult(finalText ? ('認識: ' + finalText) : '認識結果なし');
      setStatus(finalText ? '✅ 完了' : '⚠️ 認識結果なし', finalText ? '#86efac' : '#fbbf24');

      if(finalText){
        sendResult(finalText);
        // ★ 再利用方式なので、基本的に自動で閉じない
        if(autoClose === true){
          setTimeout(function(){ window.close(); }, 1200);
        }
      }
    }

    function stopRec(){
      try {
        if(recognition && isListening){
          setStatus('Stopping...', '#fbbf24');
          recognition.stop();
        } else {
          finishWithText('', false);
        }
      } catch(e){
        finishWithText(heardFinal || heardInterim || '', false);
      }
    }

    function startRec(){
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){
        setStatus('非対応ブラウザです', '#fca5a5');
        sendError('SpeechRecognition not supported');
        return;
      }

      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        setStatus('このブラウザではマイクAPIが使えません', '#fca5a5');
        sendError('getUserMedia not supported');
        return;
      }

      heardFinal = '';
      heardInterim = '';
      setResult('');
      setDebug('Preparing microphone...');

      navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
        stream.getTracks().forEach(function(t){ t.stop(); });

        recognition = new SR();
        recognition.lang = 'en-US';
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = function(){
          setButtons(true);
          setStatus('🔴 Listening... Speak now.', '#bfdbfe');
          setDebug('event: recognition started');

          timer = setTimeout(function(){
            setDebug('event: timeout auto-stop');
            try {
              if(recognition && isListening) recognition.stop();
            } catch(e){}
            setTimeout(function(){
              if(isListening){
                finishWithText(heardFinal || heardInterim || '', false);
              }
            }, 300);
          }, 10000);
        };

        recognition.onspeechstart = function(){
          setStatus('🎧 Speech detected...', '#bfdbfe');
          setDebug('event: speech detected');
        };

        recognition.onspeechend = function(){
          setStatus('Processing...', '#fbbf24');
          setDebug('event: speech ended');
          try { recognition.stop(); } catch(e){}
        };

        recognition.onresult = function(e){
          var interim = '';
          var finalText = '';

          for(var i = e.resultIndex; i < e.results.length; i++){
            var text = '';
            try { text = e.results[i][0].transcript || ''; } catch(err){}
            if(e.results[i].isFinal){
              finalText += text;
            } else {
              interim += text;
            }
          }

          if(interim){
            heardInterim = interim;
            setResult('途中認識: ' + interim);
            setDebug('event: interim result');
          }

          if(finalText){
            heardFinal += finalText;
            setDebug('event: final result');
            finishWithText(heardFinal, false);
          }
        };

        recognition.onerror = function(e){
          var msg = e && e.error ? e.error : 'unknown';
          cleanup();

          if(msg === 'no-speech'){
            setStatus('音声が検出されませんでした。もう一度Startを押してください。', '#fbbf24');
          } else if(msg === 'not-allowed'){
            setStatus('マイクがブロックされています。ブラウザで許可してください。', '#fca5a5');
          } else if(msg === 'aborted'){
            setStatus('停止しました。', '#fbbf24');
          } else {
            setStatus('エラー: ' + msg, '#fca5a5');
          }

          setDebug('event: recognition error: ' + msg);
          sendError(msg);
        };

        recognition.onend = function(){
          if(timer){
            clearTimeout(timer);
            timer = null;
          }

          if(isListening){
            setButtons(false);
            if(heardFinal || heardInterim){
              finishWithText(heardFinal || heardInterim, false);
            } else {
              setStatus('停止しました。認識結果がありません。もう一度Startを押してください。', '#fbbf24');
              setDebug('event: recognition ended without result');
            }
          }
        };

        try {
          recognition.start();
        } catch(e){
          cleanup();
          setStatus('開始できません: ' + (e.message || e), '#fca5a5');
          setDebug('event: start exception');
          sendError(e.message || String(e));
        }

      }).catch(function(err){
        cleanup();
        setStatus('マイク権限エラー: ' + (err.message || err.name || err), '#fca5a5');
        setDebug('event: getUserMedia error');
        sendError(err.message || err.name || String(err));
      });
    }

    // ★ 親GAS画面から対象文を受け取って、同じポップアップを再利用する
    window.addEventListener('message', function(e){
      // GitHub Pagesの単体テスト時は origin が合わないこともあるため、親originを更新
      if(e.data && e.data.type === 'SET_TARGET'){
        if(e.origin){
          parentOrigin = e.origin;
        }
        resetForNewSentence(e.data.sentence || '');
      }

      if(e.data && e.data.type === 'START_MIC'){
        startRec();
      }
    });

    renderSentence();
    sendReady();
  </script>
</body>
</html>
