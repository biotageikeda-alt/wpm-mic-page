<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Mic Recognition - WPM AI Talk</title>
  <style>
    :root{
      --bg:#1e293b;
      --panel:#0f172a;
      --card:#334155;
      --text:#f8fafc;
      --muted:#93c5fd;
      --line:#475569;
      --blue:#3b82f6;
      --blue2:#2563eb;
      --rose:#f43f5e;
      --green:#22c55e;
      --amber:#f59e0b;
      --gray:#64748b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic UI",sans-serif;
      min-height:100vh;
      padding:24px;
    }
    .wrap{
      width:min(720px,100%);
      margin:0 auto;
    }
    .label{
      color:#93c5fd;
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
      margin:0 0 8px;
    }
    .target{
      background:var(--card);
      color:#fff;
      border-radius:7px;
      padding:12px 14px;
      font-size:16px;
      line-height:1.55;
      font-weight:800;
      margin-bottom:10px;
    }
    .ipa{
      display:none;
      background:#2b3446;
      color:#fde68a;
      border:1px dashed var(--amber);
      border-radius:8px;
      padding:10px 12px;
      font-size:15px;
      line-height:1.7;
      font-weight:800;
      margin:8px 0 10px;
    }
    .hint{
      color:#cbd5e1;
      font-size:15px;
      margin:16px 0 12px;
      line-height:1.5;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin:10px 0;
    }
    button{
      min-height:42px;
      border:0;
      border-radius:8px;
      padding:0 16px;
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
    }
    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }
    .primary{
      background:var(--blue);
    }
    .primary:hover{
      background:var(--blue2);
    }
    .stop{
      background:var(--gray);
    }
    .speak{
      background:#0ea5e9;
    }
    .mic{
      background:var(--rose);
    }
    .next{
      background:#6366f1;
    }
    .reset{
      background:#475569;
    }
    .ipaBtn{
      background:#f59e0b;
      color:#1e293b;
    }
    .small{
      min-height:32px;
      padding:0 10px;
      font-size:12px;
      border-radius:999px;
    }
    .statusbar{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:4px;
      min-height:26px;
      padding:3px 9px;
      border:1px solid #64748b;
      border-radius:999px;
      background:#263449;
      color:#cbd5e1;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
    }
    .pill.ready{
      background:#dcfce7;
      color:#166534;
      border-color:#86efac;
    }
    .pill.waiting{
      background:#fff7ed;
      color:#9a3412;
      border-color:#fdba74;
    }
    .pill.playing{
      background:#dbeafe;
      color:#1d4ed8;
      border-color:#93c5fd;
    }
    .pill.error{
      background:#fee2e2;
      color:#991b1b;
      border-color:#fca5a5;
    }
    .heard{
      margin-top:14px;
      background:#111827;
      border:1px solid #374151;
      border-radius:8px;
      padding:10px 12px;
      min-height:44px;
      color:#e5e7eb;
      font-size:14px;
      line-height:1.5;
    }
    .event{
      color:#93c5fd;
      font-size:12px;
      margin-top:12px;
      line-height:1.45;
      word-break:break-word;
    }
    .levelWrap{
      flex:1 1 140px;
      height:9px;
      background:#334155;
      border:1px solid #475569;
      border-radius:999px;
      overflow:hidden;
    }
    .levelBar{
      width:0%;
      height:100%;
      background:#22c55e;
      transition:width .08s linear;
    }
    @media(max-width:520px){
      body{
        padding:18px;
      }
      button{
        flex:1 1 auto;
      }
      .target{
        font-size:15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="label">Target sentence:</p>
    <div id="targetText" class="target">Loading...</div>
    <div id="ipaText" class="ipa"></div>

    <div class="statusbar">
      <span id="cacheStatus" class="pill">cache: -</span>
      <span id="waitStatus" class="pill ready">status: ready</span>
      <span id="roleStatus" class="pill">role: -</span>
    </div>

    <p class="hint">🎙 Startを押して話してください</p>

    <div class="row">
      <button id="startBtn" class="primary">🎙 Start</button>
      <button id="stopBtn" class="stop" disabled>■ Stop</button>
    </div>

    <div class="row">
      <button id="ipaBtn" class="ipaBtn small">IPA切替</button>
      <button id="speakABtn" class="speak small">🔊 Speak A</button>
      <button id="speakBBtn" class="speak small">🔊 Speak B</button>
      <button id="nextBtn" class="next small">Next ▶</button>
      <button id="resetBtn" class="reset small">Reset</button>
    </div>

    <div class="row" style="margin-top:12px;">
      <span class="pill">mic level</span>
      <div class="levelWrap">
        <div id="levelBar" class="levelBar"></div>
      </div>
      <span id="levelText" class="pill">0%</span>
    </div>

    <div id="heardText" class="heard">Recognized speech will appear here.</div>
    <div id="eventText" class="event">event: target updated / Chrome SpeechRecognition mode</div>
  </div>

  <script>
    (function(){
      const params = new URLSearchParams(location.search);

      let target = params.get('sentence') || '';
      let origin = params.get('origin') || '*';
      let role = params.get('role') || 'B';
      let ipa = params.get('ipa') || '';
      let progress = params.get('progress') || '';

      const $ = id => document.getElementById(id);

      let rec = null;
      let listening = false;
      let audioStream = null;
      let audioCtx = null;
      let analyser = null;
      let levelTimer = null;
      let ipaVisible = false;

      function setStatus(text, cls){
        const el = $('waitStatus');
        el.textContent = 'status: ' + text;
        el.className = 'pill ' + (cls || '');
        send({
          type: 'MIC_STATUS',
          status: text
        });
      }

      function setCache(text, cls){
        const el = $('cacheStatus');
        el.textContent = 'cache: ' + text;
        el.className = 'pill ' + (cls || '');
      }

      function setEvent(text){
        $('eventText').textContent = 'event: ' + text;
      }

      function send(data){
        try{
          if(window.opener && !window.opener.closed){
            window.opener.postMessage(
              data,
              origin === 'null' ? '*' : origin
            );
          }
        }catch(e){}
      }

      function updateTarget(nextTarget, nextRole, nextIpa, nextProgress){
        target = nextTarget || target;
        role = nextRole || role || 'B';
        ipa = nextIpa || '';
        progress = nextProgress || '';

        $('targetText').textContent = target || '-';
        $('ipaText').textContent = ipa || 'IPA is not available for this sentence.';
        $('roleStatus').textContent = 'role: ' + role + (progress ? ' / ' + progress : '');

        setCache('ready', 'ready');
        setStatus('ready', 'ready');
        setEvent('target updated / Chrome SpeechRecognition mode');
      }

      async function initMicLevel(){
        try{
          if(audioStream) return;

          audioStream = await navigator.mediaDevices.getUserMedia({
            audio: true
          });

          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const src = audioCtx.createMediaStreamSource(audioStream);

          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          src.connect(analyser);

          const data = new Uint8Array(analyser.frequencyBinCount);

          levelTimer = setInterval(function(){
            if(!analyser) return;

            analyser.getByteFrequencyData(data);

            let sum = 0;
            for(let i = 0; i < data.length; i++){
              sum += data[i];
            }

            const level = Math.min(100, Math.round((sum / data.length) * 1.2));

            $('levelBar').style.width = level + '%';
            $('levelText').textContent = level + '%';
          }, 120);
        }catch(e){
          setEvent('mic level unavailable: ' + (e.message || e));
        }
      }

      function startRecognition(){
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

        if(!SR){
          setStatus('SpeechRecognition not supported', 'error');
          send({
            type: 'MIC_ERROR',
            error: 'SpeechRecognition not supported'
          });
          return;
        }

        try{
          if(rec) rec.abort();
        }catch(e){}

        rec = new SR();
        rec.lang = 'en-US';
        rec.interimResults = true;
        rec.continuous = false;

        let finalText = '';

        rec.onstart = function(){
          listening = true;
          $('startBtn').disabled = true;
          $('stopBtn').disabled = false;

          setStatus('listening', 'waiting');
          setEvent('listening');

          initMicLevel();
        };

        rec.onresult = function(ev){
          let interim = '';

          for(let i = ev.resultIndex; i < ev.results.length; i++){
            const text = ev.results[i][0].transcript || '';

            if(ev.results[i].isFinal){
              finalText += text + ' ';
            }else{
              interim += text;
            }
          }

          $('heardText').textContent = (finalText + interim).trim() || 'Listening...';
        };

        rec.onerror = function(ev){
          listening = false;
          $('startBtn').disabled = false;
          $('stopBtn').disabled = true;

          const err = ev && ev.error ? ev.error : 'unknown';

          setStatus('error', 'error');
          setEvent('error: ' + err);

          send({
            type: 'MIC_ERROR',
            error: err
          });
        };

        rec.onend = function(){
          listening = false;
          $('startBtn').disabled = false;
          $('stopBtn').disabled = true;

          const heard = $('heardText').textContent || finalText.trim();

          setStatus('ready', 'ready');
          setEvent('recognition ended');

          if(
            heard &&
            heard !== 'Listening...' &&
            heard !== 'Recognized speech will appear here.'
          ){
            send({
              type: 'MIC_RESULT',
              text: heard.trim(),
              role: role,
              target: target
            });
          }
        };

        $('heardText').textContent = 'Listening...';

        try{
          rec.start();
        }catch(e){
          setEvent('start failed: ' + (e.message || e));
        }
      }

      function stopRecognition(){
        try{
          if(rec) rec.stop();
        }catch(e){}

        setEvent('manual stop');
      }

      function requestParent(action){
        setStatus(
          action.toLowerCase(),
          action === 'NEXT' ? 'waiting' : 'playing'
        );

        send({
          type: 'MIC_CONTROL',
          action: action,
          role: role,
          target: target
        });
      }

      window.addEventListener('message', function(e){
        const d = e.data || {};

        if(d.type === 'MIC_TARGET'){
          updateTarget(
            d.sentence || d.target,
            d.role,
            d.ipa,
            d.progress
          );
        }

        if(d.type === 'MIC_PARENT_STATUS'){
          if(d.status){
            setStatus(d.status, d.className || '');
          }

          if(d.cache){
            setCache(d.cache, d.cacheClass || '');
          }
        }
      });

      $('startBtn').addEventListener('click', startRecognition);
      $('stopBtn').addEventListener('click', stopRecognition);

      $('ipaBtn').addEventListener('click', function(){
        ipaVisible = !ipaVisible;

        $('ipaText').style.display = ipaVisible ? 'block' : 'none';
        $('ipaBtn').textContent = ipaVisible ? 'English表示' : 'IPA切替';
      });

      $('speakABtn').addEventListener('click', function(){
        requestParent('SPEAK_A');
      });

      $('speakBBtn').addEventListener('click', function(){
        requestParent('SPEAK_B');
      });

      $('nextBtn').addEventListener('click', function(){
        requestParent('NEXT');
      });

      $('resetBtn').addEventListener('click', function(){
        requestParent('RESET');
      });

      updateTarget(target, role, ipa, progress);
    })();
  </script>
</body>
</html>
