<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mic Recognition Full - IPA + Auto Stop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* 元の mic.html の CSS をそのまま使用 */
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#1e293b;color:#e5e7eb;padding:24px 18px;}
.label{color:#93c5fd;font-size:14px;margin-bottom:8px;font-weight:800;letter-spacing:.04em;}
.sentence{background:#334155;color:#fff;border-radius:10px;padding:15px;font-size:20px;line-height:1.45;font-weight:800;margin-bottom:12px;}
.sentenceText{display:block;}
.ipaLine{margin-top:10px;color:#bfdbfe;font-size:15px;line-height:1.45;font-weight:700;opacity:.96;word-break:break-word;}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 18px;}
.badge{border:1px solid rgba(255,255,255,.20);background:#334155;color:#dbeafe;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:800;}
.badge.ok{background:#dcfce7;color:#166534;border-color:#86efac;}
.badge.warn{background:#fef3c7;color:#92400e;border-color:#fbbf24;}
.status{font-size:19px;color:#cbd5e1;margin:16px 0;min-height:28px;}
.status.listening{color:#fbbf24;}
.status.done{color:#86efac;}
.status.err{color:#fca5a5;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;}
button{border:none;border-radius:12px;padding:14px 22px;font-size:18px;font-weight:850;color:#fff;cursor:pointer;background:#3b82f6;min-width:128px;}
button:disabled{opacity:.45;cursor:not-allowed;background:#64748b;}
.stop{background:#64748b;}
.subBtns button{min-width:auto;padding:11px 18px;font-size:15px;border-radius:999px;}
.yellow{background:#f59e0b;}
.cyan{background:#0ea5e9;}
.purple{background:#6d5dfc;}
.gray{background:#475569;}
.wide{width:100%;background:#64748b;}
.meterWrap{display:flex;align-items:center;gap:10px;margin-top:14px;color:#cbd5e1;font-weight:700;}
.meter{flex:1;height:10px;border-radius:999px;background:#334155;overflow:hidden;border:1px solid rgba(255,255,255,.15);}
.bar{height:100%;width:0%;background:#60a5fa;transition:width .12s linear;}
.result{margin-top:18px;background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px;font-size:17px;line-height:1.5;min-height:28px;}
.previewBox{margin-top:20px;}
.previewTitle{color:#93c5fd;font-size:14px;font-weight:800;margin-bottom:8px;}
.previewText{background:#0f172a;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px;max-height:260px;overflow:auto;color:#dbeafe;}
.line{display:grid;grid-template-columns:44px 1fr;gap:8px;align-items:start;border-bottom:1px solid rgba(255,255,255,.08);padding:7px 0;}
.line:last-child{border-bottom:none;}
.tag{border-radius:999px;padding:3px 7px;font-size:12px;font-weight:900;text-align:center;}
.tagA{background:#dbeafe;color:#1d4ed8;}
.tagB{background:#ffe4e6;color:#be123c;}
.tagN{background:#334155;color:#cbd5e1;}
.txt{font-size:14px;line-height:1.55;color:#f8fafc;white-space:pre-wrap;word-break:break-word;}
.no{color:#93c5fd;font-size:12px;font-weight:800;margin-right:4px;}
.debug{margin-top:16px;color:#93c5fd;font-size:13px;word-break:break-word;}
</style>
</head>
<body>

<div class="label">Target sentence:</div>
<div id="sentence" class="sentence">(no sentence)</div>

<div class="badges">
  <span class="badge ok">cache: ready</span>
  <span id="statusBadge" class="badge ok">status: ready</span>
  <span id="roleBadge" class="badge">role: B</span>
  <span id="modeBadge" class="badge">mode: standard</span>
</div>

<div id="status" class="status">🎙 Startを押して話してください</div>

<div class="controls">
  <button id="startBtn" onclick="startRec()">🎙 Start</button>
  <button id="stopBtn" class="stop" onclick="stopRec()" disabled>■ Stop</button>
</div>

<div class="controls subBtns">
  <button id="ipaBtn" class="yellow" onclick="toggleIPA()">英+IPA</button>
  <button class="cyan" onclick="speakRole('A')">🔊 Speak A</button>
  <button class="cyan" onclick="speakRole('B')">🔊 Speak B</button>
  <button class="gray" onclick="sendPrev()">◀ Prev</button>
  <button class="purple" onclick="sendNext()">Next ▶</button>
  <button class="wide" onclick="resetView()">Reset</button>
</div>

<div class="meterWrap">
  <span>mic level</span>
  <div class="meter"><div id="bar" class="bar"></div></div>
  <span id="levelText">0%</span>
</div>

<div id="result" class="result"></div>

<div class="previewBox">
  <div class="previewTitle">Script preview</div>
  <div id="scriptPreview" class="previewText">(no script preview)</div>
</div>

<div id="debug" class="debug">event: idle</div>

<script>
var recognition=null,isListening=false,softEndTimer=null;
var heardFinal='',heardInterim='';

var SILENCE_THRESHOLD=0.02;
var AUTO_STOP_MS = 2000; // 無音2秒でStop

function startSoftEndTimer(){
  if(softEndTimer) clearTimeout(softEndTimer);
  softEndTimer = setTimeout(function(){
    if(isListening){
      stopRec();
    }
  }, AUTO_STOP_MS);
}

function onAudioProcess(volume){
  if(volume < SILENCE_THRESHOLD){
    startSoftEndTimer();
  } else {
    if(softEndTimer){ clearTimeout(softEndTimer); softEndTimer=null; }
  }
}

function startRec(){
  if(isListening) return;
  heardFinal=''; heardInterim='';
  setStatus('🎙 Listening...', 'listening');
  setButtons(true);

  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    startMeter(stream);

    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = function(event){
      var finalText='',interimText='';
      for(var i=event.resultIndex;i<event.results.length;i++){
        var txt = event.results[i][0].transcript || '';
        if(event.results[i].isFinal) finalText += txt;
        else interimText += txt;
      }
      if(finalText.trim()) heardFinal += (heardFinal?' ':'')+finalText.trim();
      if(interimText.trim()) heardInterim = interimText.trim();

      $('result').textContent = '認識: '+(heardFinal || heardInterim);
    };

    recognition.onstart = function(){ isListening=true; };
    recognition.onerror = function(e){ console.log(e); stopRec(); };
    recognition.onend = function(){ if(isListening) stopRec(); };
    recognition.start();
  });
}

function stopRec(){
  if(recognition) recognition.stop();
  isListening=false;
  setButtons(false);
  setStatus('🎙 Stopped','done');
  if(softEndTimer){ clearTimeout(softEndTimer); softEndTimer=null; }
}

function setButtons(listening){
  $('startBtn').disabled=listening;
  $('stopBtn').disabled=!listening;
}

function $(id){ return document.getElementById(id); }

function toggleIPA(){ console.log('toggleIPA'); }
function speakRole(r){ console.log('speakRole',r); }
function sendPrev(){ console.log('sendPrev'); }
function sendNext(){ console.log('sendNext'); }
function resetView(){ console.log('resetView'); }

function startMeter(stream){
  try{
    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var analyser = audioCtx.createAnalyser();
    analyser.fftSize=1024;
    var source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    var data=new Uint8Array(analyser.fftSize);
    function tick(){
      analyser.getByteTimeDomainData(data);
      var sum=0;
      for(var i=0;i<data.length;i++){
        var v=(data[i]-128)/128;
        sum+=v*v;
      }
      var pct=Math.min(100,Math.round(Math.sqrt(sum/data.length)*260));
      $('bar').style.width=pct+'%';
      $('levelText').textContent=pct+'%';
      onAudioProcess(Math.sqrt(sum/data.length));
      if(isListening) requestAnimationFrame(tick);
    }
    tick();
  }catch(e){ console.log('meter error',e);}
}
</script>
</body>
</html>
