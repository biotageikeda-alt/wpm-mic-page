<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mic Recognition Full - IPA + Auto Stop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* 略：既存の mic.html の CSS 全部をここに入れる */
</style>
</head>
<body>

<!-- UI部分 -->
<div class="label">Target sentence:</div>
<div id="sentence" class="sentence">(no sentence)</div>

<div class="badges">
  <span class="badge ok">cache: ready</span>
  <span id="statusBadge" class="badge ok">status: ready</span>
  <span id="roleBadge" class="badge">role: B</span>
  <span id="modeBadge" class="badge">mode: standard</span>
</div>

<div id="status" class="status">🎙 Startを押して話してください</div>

<div class="controls">
  <button id="startBtn" onclick="startRec()">🎙 Start</button>
  <button id="stopBtn" class="stop" onclick="stopRec()" disabled>■ Stop</button>
</div>

<div class="controls subBtns">
  <button id="ipaBtn" class="yellow" onclick="toggleIPA()">英+IPA</button>
  <button class="cyan" onclick="speakRole('A')">🔊 Speak A</button>
  <button class="cyan" onclick="speakRole('B')">🔊 Speak B</button>
  <button class="gray" onclick="sendPrev()">◀ Prev</button>
  <button class="purple" onclick="sendNext()">Next ▶</button>
  <button class="wide" onclick="resetView()">Reset</button>
</div>

<div class="meterWrap">
  <span>mic level</span>
  <div class="meter"><div id="bar" class="bar"></div></div>
  <span id="levelText">0%</span>
</div>

<div id="result" class="result"></div>

<div class="previewBox">
  <div class="previewTitle">Script preview</div>
  <div id="scriptPreview" class="previewText">(no script preview)</div>
</div>

<div id="debug" class="debug">event: idle</div>

<script>
// ------------------- グローバル -------------------
var recognition=null,isListening=false,softEndTimer=null;
var SILENCE_THRESHOLD=0.02; // 無音判定閾値
var sentence='',ipaMode=0,role='B',receivedIpa='',receivedIpaTarget='';

// ------------------- ソフト停止タイマー -------------------
function startSoftEndTimer(){
  if(softEndTimer) clearTimeout(softEndTimer);
  softEndTimer = setTimeout(function(){
    if(isListening){
      console.log('Soft end triggered: auto Stop');
      stopRec();
    }
  }, 2000); // 無音2秒
}

// 音声入力プロセス中に呼び出す
function onAudioProcess(volume){
  if(volume < SILENCE_THRESHOLD){
    startSoftEndTimer();
  } else {
    if(softEndTimer){ clearTimeout(softEndTimer); softEndTimer=null; }
  }
}

// ------------------- マイク開始 -------------------
function startRec(){
  if(isListening) return;
  isListening=true;
  setButtons(isListening);
  setStatus('🎙 Listening...', 'listening');

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    var audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    var analyser=audioCtx.createAnalyser();
    var source=audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    var dataArray=new Uint8Array(analyser.fftSize);

    function updateMeter(){
      analyser.getByteTimeDomainData(dataArray);
      var sum=0;
      for(var i=0;i<dataArray.length;i++){
        var val=(dataArray[i]-128)/128;
        sum+=val*val;
      }
      var volume=Math.sqrt(sum/dataArray.length);
      document.getElementById('levelText').textContent=(volume*100).toFixed(0)+'%';
      document.getElementById('bar').style.width=(volume*100)+'%';
      onAudioProcess(volume);
      if(isListening) requestAnimationFrame(updateMeter);
    }
    updateMeter();
  }).catch(err=>{
    console.error(err);
    setStatus('Microphone access denied', 'err');
    setButtons(false);
    isListening=false;
  });
}

// ------------------- マイク停止 -------------------
function stopRec(){
  isListening=false;
  setButtons(false);
  setStatus('🎙 Stopped', 'done');
  if(softEndTimer){ clearTimeout(softEndTimer); softEndTimer=null; }
}

// ------------------- UI更新 -------------------
function setButtons(listening){
  document.getElementById('startBtn').disabled=listening;
  document.getElementById('stopBtn').disabled=!listening;
}

function setStatus(text,cls){
  var el=document.getElementById('status');
  el.textContent=text;
  el.className='status '+(cls||'');
}

// ------------------- mic.html 既存機能 -------------------
function toggleIPA(){
  ipaMode = (ipaMode+1)%3;
  renderSentence();
}
function speakRole(r){console.log('Speak Role:',r);}
function sendPrev(){console.log('Prev sentence');}
function sendNext(){console.log('Next sentence');}
function resetView(){console.log('Reset view');}

// ------------------- IPA表示用（既存 mic.html ロジック） -------------------
function renderSentence(){
  var el=document.getElementById('sentence');
  if(!el) return;
  var en=sentence||'(no sentence)';
  var ipa=(receivedIpaTarget===sentence && receivedIpa)?receivedIpa:fallbackSentenceToIPA(sentence);
  if(ipaMode===0){
    el.innerHTML='<span class="sentenceText">'+en+'</span>'+
                 '<div class="ipaLine">'+(ipa||'(IPA not available)')+'</div>';
  } else if(ipaMode===1){
    el.innerHTML='<span class="sentenceText">'+en+'</span>';
  } else {
    el.innerHTML='<div class="ipaLine">'+(ipa||'(IPA not available)')+'</div>';
  }
}
function fallbackSentenceToIPA(text){return text;} // 仮

</script>
</body>
</html>
