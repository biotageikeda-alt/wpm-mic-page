<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mic Recognition - Breathing Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* 省略: CSSは以前の0502U版そのまま利用可能 */
</style>
</head>
<body>
<div class="label">Target sentence:</div>
<div id="sentence" class="sentence">(no sentence)</div>
<div class="badges">
  <span class="badge ok">cache: ready</span>
  <span id="statusBadge" class="badge ok">status: ready</span>
  <span id="roleBadge" class="badge">role: B</span>
  <span id="modeBadge" class="badge">mode: standard</span>
</div>
<div id="status" class="status">🎙 Startを押して話してください</div>
<div class="controls">
  <button id="startBtn" onclick="startRec()">🎙 Start</button>
  <button id="stopBtn" class="stop" onclick="stopRec()" disabled>■ Stop</button>
</div>
<div class="controls subBtns">
  <button id="ipaBtn" class="yellow" onclick="toggleIPA()">英+IPA</button>
  <button class="cyan" onclick="speakRole('A')">🔊 Speak A</button>
  <button class="cyan" onclick="speakRole('B')">🔊 Speak B</button>
  <button class="gray" onclick="sendPrev()">◀ Prev</button>
  <button class="purple" onclick="sendNext()">Next ▶</button>
  <button class="wide" onclick="resetView()">Reset</button>
</div>
<div class="meterWrap">
  <span>mic level</span>
  <div class="meter"><div id="bar" class="bar"></div></div>
  <span id="levelText">0%</span>
</div>
<div id="result" class="result"></div>
<div class="previewBox">
  <div class="previewTitle">Script preview</div>
  <div id="scriptPreview" class="previewText">(no script preview)</div>
</div>
<div id="debug" class="debug">event: idle</div>

<script>
// ==============================
// 0502U Breathing-Stable Mic JS
// ==============================
(function(){
  window.__micPageBuild = 'mic_html_0502U_breathing_stable_recognition';

  var params = new URLSearchParams(location.search);
  var sentence = params.get('sentence') || '';
  var role = params.get('role') || 'B';
  var scriptPreview = params.get('script') || '';
  var parentOrigin = params.get('origin') || 'https://script.google.com';
  var token = params.get('token') || 'wpm_mic_result_latest';
  var mode = params.get('mode') || 'popup';

  // IPA
  var ipaMode = 0;
  var receivedIpa = params.get('ipa') || '';
  var receivedIpaTarget = params.get('ipaTarget') || sentence || '';

  // Speech Recognition
  var recognition = null;
  var isListening = false;
  var manualStop = false;
  var soundEndTimer = null;
  var lastRestartAt = 0;
  var heardFinal = '';
  var heardInterim = '';

  var MAX_LISTEN_MS = navigator.userAgent.indexOf('Android')>=0 ? 25000 : 22000;
  var SILENCE_END_MS = navigator.userAgent.indexOf('Android')>=0 ? 12000 : 10000;
  var SOUND_END_GRACE_MS = 700;

  function setStatus(text, cls){ var el=document.getElementById('status'); if(el){el.textContent=text||''; el.className='status '+(cls||''); } }
  function setDebug(text){ var el=document.getElementById('debug'); if(el) el.textContent=text||''; }

  function startRec(){
    if(isListening) return;
    manualStop = false;
    if(soundEndTimer){ clearTimeout(soundEndTimer); soundEndTimer=null; }

    heardFinal = '';
    heardInterim = '';

    try{
      navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onsoundend = function(){
          if(soundEndTimer) clearTimeout(soundEndTimer);
          soundEndTimer = setTimeout(function(){
            setDebug('event: silence confirmed (auto-restart)');
          }, SOUND_END_GRACE_MS);
        };
        recognition.onsoundstart = function(){
          if(soundEndTimer){ clearTimeout(soundEndTimer); soundEndTimer=null; }
          setDebug('event: sound resumed (息継ぎだった)');
        };

        recognition.onresult = function(event){
          var finalText='', interimText='';
          for(var i=event.resultIndex;i<event.results.length;i++){
            var t=event.results[i][0].transcript||'';
            if(event.results[i].isFinal) finalText+=t; else interimText+=t;
          }
          if(finalText.trim()) heardFinal += (heardFinal?' ':'')+finalText.trim();
          if(interimText.trim()) heardInterim = interimText.trim();
          var show = heardFinal || heardInterim;
          if(show) document.getElementById('result').textContent = '認識: '+show;
        };

        recognition.onend = function(){
          if(soundEndTimer){ clearTimeout(soundEndTimer); soundEndTimer=null; }
          if(!isListening || manualStop){
            var text = heardFinal || heardInterim || '';
            if(isListening) finishWithText(text,false);
            else cleanupRecognition();
            return;
          }
          var sinceLast = Date.now() - lastRestartAt;
          var delay = Math.max(250,300-sinceLast);
          setDebug('event: auto-restart in '+delay+'ms');
          setTimeout(function(){
            if(!isListening || manualStop) return;
            try{ lastRestartAt=Date.now(); recognition.start(); }
            catch(e){ finishWithText(heardFinal || heardInterim || '', false); }
          }, delay);
        };

        recognition.onerror = function(e){
          if(e && e.error==='not-allowed'){ setStatus('マイク権限エラー', 'err'); }
        };

        recognition.start();
        isListening=true;
        setStatus('Listening...', 'listening');
      });
    }catch(e){
      setStatus('音声認識開始失敗', 'err');
      setDebug('exception: '+(e.message||e));
    }
  }

  function stopRec(){ manualStop=true; if(soundEndTimer){ clearTimeout(soundEndTimer); soundEndTimer=null; } try{ if(recognition && isListening) recognition.stop(); }catch(e){} }

})();
</script>
</body>
</html>
