<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mic Recognition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#1e293b;color:#e5e7eb;padding:28px 24px;}
    .label{color:#93c5fd;font-size:14px;margin-bottom:10px;font-weight:700;letter-spacing:.04em;}
    .sentence{background:#334155;color:#fff;border-radius:10px;padding:16px;font-size:20px;line-height:1.45;font-weight:700;margin-bottom:14px;}
    .badges{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0 22px;}
    .badge{border:1px solid rgba(255,255,255,.20);background:#334155;color:#dbeafe;border-radius:999px;padding:8px 12px;font-size:14px;font-weight:700;}
    .badge.ok{background:#dcfce7;color:#166534;border-color:#86efac;}
    .status{font-size:20px;color:#cbd5e1;margin:18px 0;min-height:30px;}
    .status.listening{color:#fbbf24}.status.done{color:#86efac}.status.err{color:#fca5a5}
    .controls{display:flex;gap:14px;flex-wrap:wrap;margin:18px 0;}
    button{border:none;border-radius:12px;padding:16px 28px;font-size:19px;font-weight:800;color:#fff;cursor:pointer;background:#3b82f6;min-width:140px;}
    button:disabled{opacity:.45;cursor:not-allowed;background:#64748b}.stop{background:#64748b}
    .subBtns button{min-width:auto;padding:12px 22px;font-size:16px;border-radius:999px;}
    .yellow{background:#f59e0b}.cyan{background:#0ea5e9}.purple{background:#6d5dfc}.wide{width:100%;background:#64748b}
    .meterWrap{display:flex;align-items:center;gap:12px;margin-top:16px;color:#cbd5e1;font-weight:700;}
    .meter{flex:1;height:10px;border-radius:999px;background:#334155;overflow:hidden;border:1px solid rgba(255,255,255,.15);}
    .bar{height:100%;width:0%;background:#60a5fa;transition:width .12s linear;}
    .result{margin-top:20px;background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:16px;font-size:18px;line-height:1.5;min-height:28px;}
    .previewBox{margin-top:22px}.previewTitle{color:#93c5fd;font-size:14px;font-weight:700;margin-bottom:8px;}
    .previewText{background:#0f172a;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px;max-height:220px;overflow:auto;white-space:pre-wrap;font-size:13px;line-height:1.55;color:#dbeafe;}
    .debug{margin-top:18px;color:#93c5fd;font-size:14px;word-break:break-word;}
  </style>
</head>
<body>
  <div class="label">Target sentence:</div>
  <div id="sentence" class="sentence">(no sentence)</div>
  <div class="badges">
    <span id="cacheBadge" class="badge ok">cache: ready</span>
    <span id="statusBadge" class="badge ok">status: ready</span>
    <span id="roleBadge" class="badge">role: B</span>
  </div>
  <div id="status" class="status">🎙 Startを押して話してください</div>
  <div class="controls">
    <button id="startBtn" onclick="startRec()">🎙 Start</button>
    <button id="stopBtn" class="stop" onclick="stopRec()" disabled>■ Stop</button>
  </div>
  <div class="controls subBtns">
    <button class="yellow" onclick="toggleIPA()">IPA切替</button>
    <button class="cyan" onclick="speakRole('A')">🔊 Speak A</button>
    <button class="cyan" onclick="speakRole('B')">🔊 Speak B</button>
    <button class="purple" onclick="sendNext()">Next ▶</button>
    <button class="wide" onclick="resetView()">Reset</button>
  </div>
  <div class="meterWrap"><span>mic level</span><div class="meter"><div id="bar" class="bar"></div></div><span id="levelText">0%</span></div>
  <div id="result" class="result"></div>
  <div class="previewBox"><div class="previewTitle">Script preview</div><div id="scriptPreview" class="previewText">(no script preview)</div></div>
  <div id="debug" class="debug">event: idle</div>
<script>
(function(){ window.__micPageBuild='mic_html_0502E_script_preview_timeout_result_fix'; })();

var params=new URLSearchParams(window.location.search);
var sentence=params.get('sentence')||'';
var parentOrigin=params.get('origin')||'https://script.google.com';
var role=params.get('role')||'B';
var scriptPreview=params.get('script')||'';
var recognition=null,isListening=false,heardFinal='',heardInterim='',hardTimer=null,noSpeechTimer=null;
var audioCtx=null,analyser=null,micStream=null,meterRaf=null;
var MAX_LISTEN_MS=12000,SILENCE_END_MS=6500;

function $(id){return document.getElementById(id);}
function setStatus(text,cls){var el=$('status');el.textContent=text||'';el.className='status '+(cls||'');}
function setDebug(text){$('debug').textContent=text||'';}
function setButtons(listening){$('startBtn').disabled=!!listening;$('stopBtn').disabled=!listening;}
function setScriptPreview(text){scriptPreview=String(text||'');var el=$('scriptPreview');if(el)el.textContent=scriptPreview||'(no script preview)';}
function setSentence(text,r){sentence=String(text||'').trim();role=r||role||'B';$('sentence').textContent=sentence||'(no sentence)';$('roleBadge').textContent='role: '+role;setStatus('🎙 Startを押して話してください','');$('result').textContent='';setDebug('event: target ready');}
function cleanupTimers(){if(hardTimer){clearTimeout(hardTimer);hardTimer=null;}if(noSpeechTimer){clearTimeout(noSpeechTimer);noSpeechTimer=null;}}
function cleanupMeter(){try{if(meterRaf)cancelAnimationFrame(meterRaf);}catch(e){}meterRaf=null;try{if(micStream)micStream.getTracks().forEach(function(t){t.stop();});}catch(e){}micStream=null;try{if(audioCtx&&audioCtx.state!=='closed')audioCtx.close();}catch(e){}audioCtx=null;analyser=null;$('bar').style.width='0%';$('levelText').textContent='0%';}
function cleanupRecognition(){cleanupTimers();cleanupMeter();isListening=false;setButtons(false);$('statusBadge').textContent='status: ready';$('statusBadge').className='badge ok';}
function postToParent(payload){try{if(window.opener&&!window.opener.closed)window.opener.postMessage(payload,parentOrigin);}catch(e){}try{if(window.parent&&window.parent!==window)window.parent.postMessage(payload,parentOrigin);}catch(e){}}
function finishWithText(text,autoStop){text=String(text||'').trim();cleanupRecognition();if(text){$('result').textContent='認識: '+text;setStatus('✅ 完了','done');setDebug('event: final result sent');postToParent({type:'MIC_RESULT',text:text,target:sentence,role:role});}else{$('result').textContent='';setStatus('停止しました。認識結果がありません。もう一度Startを押してください。','err');setDebug(autoStop?'event: timeout/no result':'event: recognition ended without result');postToParent({type:'MIC_EMPTY',target:sentence,role:role});}}
function stopRec(){try{if(recognition&&isListening){setStatus('Stopping...','listening');recognition.stop();}}catch(e){cleanupRecognition();setStatus('停止しました。','');setDebug('event: stop exception');}}
function startMeter(stream){try{micStream=stream;audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=1024;var source=audioCtx.createMediaStreamSource(stream);source.connect(analyser);var data=new Uint8Array(analyser.fftSize);function tick(){if(!analyser)return;analyser.getByteTimeDomainData(data);var sum=0;for(var i=0;i<data.length;i++){var v=(data[i]-128)/128;sum+=v*v;}var rms=Math.sqrt(sum/data.length);var pct=Math.min(100,Math.round(rms*260));$('bar').style.width=pct+'%';$('levelText').textContent=pct+'%';meterRaf=requestAnimationFrame(tick);}tick();}catch(e){setDebug('event: meter unavailable');}}
function startRec(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){setStatus('このブラウザは音声認識に対応していません。Chromeを使用してください。','err');setDebug('event: SpeechRecognition not supported');return;}if(isListening)return;heardFinal='';heardInterim='';$('result').textContent='';setStatus('マイク権限を確認中...','listening');setDebug('event: requesting microphone');setButtons(true);$('statusBadge').textContent='status: requesting';$('statusBadge').className='badge';
navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){startMeter(stream);recognition=new SR();recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=false;recognition.maxAlternatives=1;
recognition.onstart=function(){isListening=true;setButtons(true);setStatus('Listening...','listening');setDebug('event: recognition started');$('statusBadge').textContent='status: listening';$('statusBadge').className='badge';hardTimer=setTimeout(function(){if(!isListening)return;setDebug('event: hard timeout -> stop recognition');try{recognition.stop();}catch(e){}setTimeout(function(){if(isListening)finishWithText(heardFinal||heardInterim,true);},700);},MAX_LISTEN_MS);noSpeechTimer=setTimeout(function(){if(!isListening)return;if(!(heardFinal||heardInterim)){setDebug('event: silence timeout -> stop recognition');try{recognition.stop();}catch(e){}setTimeout(function(){if(isListening)finishWithText('',true);},700);}},SILENCE_END_MS);};
recognition.onresult=function(event){var finalText='',interimText='';for(var i=event.resultIndex;i<event.results.length;i++){var txt='';try{txt=event.results[i][0].transcript||'';}catch(e){}if(event.results[i].isFinal)finalText+=txt;else interimText+=txt;}if(finalText.trim())heardFinal+=(heardFinal?' ':'')+finalText.trim();if(interimText.trim())heardInterim=interimText.trim();var show=heardFinal||heardInterim;if(show){$('result').textContent='認識: '+show;setDebug('event: recognition result');}if(heardFinal){setTimeout(function(){if(!isListening)return;try{recognition.stop();}catch(e){}},350);}};
recognition.onerror=function(e){var msg=e&&e.error?e.error:'unknown';setDebug('event: recognition error: '+msg);if(msg==='no-speech')return;cleanupRecognition();setStatus('音声認識エラー: '+msg+'。もう一度Startを押してください。','err');};
recognition.onend=function(){var text=heardFinal||heardInterim||'';if(isListening)finishWithText(text,false);else cleanupRecognition();setDebug(text?'event: speech ended':'event: recognition ended without result');};
try{recognition.start();}catch(e){cleanupRecognition();setStatus('開始できません: '+(e.message||e),'err');setDebug('event: recognition start exception');}}).catch(function(err){cleanupRecognition();setStatus('マイク権限エラー: '+(err&&err.message?err.message:err),'err');setDebug('event: getUserMedia error');});}
function resetView(){cleanupRecognition();$('result').textContent='';setStatus('🎙 Startを押して話してください','');setDebug('event: reset');}
function toggleIPA(){postToParent({type:'MIC_TOGGLE_IPA',role:role,target:sentence});}
function speakRole(r){postToParent({type:'MIC_SPEAK_ROLE',role:r||role,target:sentence});}
function sendNext(){postToParent({type:'MIC_NEXT',role:role,target:sentence});}
window.addEventListener('message',function(e){if(!e.data)return;if(e.data.type==='SET_TARGET'){setSentence(e.data.sentence||'',e.data.role||role);if(typeof e.data.script!=='undefined')setScriptPreview(e.data.script||'');try{window.focus();}catch(ex){}}if(e.data.type==='PING'){postToParent({type:'MIC_READY',build:window.__micPageBuild,role:role,target:sentence});}});
setSentence(sentence,role);setScriptPreview(scriptPreview);
setTimeout(function(){postToParent({type:'MIC_READY',build:window.__micPageBuild,role:role,target:sentence});},500);
</script>
</body>
</html>
